ubuntu-arm64:
    image: ubuntu-arm64
    cpus: 4
    memory: 12G
    steps:
    - name: Copy Files
      copy:
        from: ./
        to: vm:~/
        exclude:
            - .git
            - .github
            - docs
            - target

    - name: Install Rust
      run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

    - name: Install Node and NPM
      run: |
        sudo apt update
        sudo apt install  -y -qq nodejs npm

    - name: Install NPM Dependencies
      run: |
        cd web
        npm install

    - name: Build
      run: . "$HOME/.cargo/env" && cargo build --release

    - name: Package
      run: tar czf virtci-linux-arm64.tar.gz -C target/release virtci

    - name: Build .deb
      run: |
        VERSION=$(cat VERSION | sed 's/^v//' | sed 's/^preview_/0~preview./')
        PKGDIR="virtci_${VERSION}_arm64"
        mkdir -p "${PKGDIR}/DEBIAN" "${PKGDIR}/usr/bin"
        cp target/release/virtci "${PKGDIR}/usr/bin/virtci"
        chmod +x "${PKGDIR}/usr/bin/virtci"
        printf 'Package: virtci\nVersion: %s\nArchitecture: arm64\nMaintainer: virtci contributors\nDepends: qemu-kvm, qemu-utils, swtpm\nDescription: Virtual machine CI runner\n' \
          "${VERSION}" > "${PKGDIR}/DEBIAN/control"
        dpkg-deb --build "${PKGDIR}" virtci-linux-arm64.deb

    - name: Copy Files
      copy:
        from: vm:~/virtci-linux-arm64.tar.gz
        to: ./

    - name: Copy .deb
      copy:
        from: vm:~/virtci-linux-arm64.deb
        to: ./
