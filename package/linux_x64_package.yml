ubuntu-server-x64:
    image: ubuntu-server-x64
    cpus: 4
    memory: 12G
    steps:
    - name: Copy Files
      copy:
        from: ./
        to: vm:~/
        exclude:
            - .git
            - .github
            - docs
            - target

    - name: Install Rust
      run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

    - name: Install Node and NPM
      run: |
        sudo apt update
        sudo apt install  -y -qq nodejs npm

    - name: Install NPM Dependencies
      run: |
        cd web
        npm install

    - name: Build
      run: . "$HOME/.cargo/env" && cargo build --release

    - name: Package
      run: tar czf virtci-linux-x64.tar.gz -C target/release virtci

    - name: Build .deb
      run: |
        VERSION=$(./target/release/virtci version | sed 's/VirtCI version: //')
        PKGDIR="virtci_${VERSION}_amd64"
        mkdir -p "${PKGDIR}/DEBIAN" "${PKGDIR}/usr/bin"
        cp target/release/virtci "${PKGDIR}/usr/bin/virtci"
        chmod +x "${PKGDIR}/usr/bin/virtci"
        printf 'Package: virtci\nVersion: %s\nArchitecture: amd64\nMaintainer: virtci contributors\nDepends: qemu-kvm, qemu-utils, swtpm\nDescription: Virtual machine CI runner\n' \
          "${VERSION}" > "${PKGDIR}/DEBIAN/control"
        dpkg-deb --build "${PKGDIR}" virtci-linux-x64.deb

    - name: Build .rpm
      run: |
        sudo apt install -y -qq rpm
        VERSION=$(./target/release/virtci version | sed 's/VirtCI version: //')
        TOPDIR="$(pwd)/rpmbuild"
        mkdir -p "${TOPDIR}"/{BUILD,RPMS,SOURCES,SPECS,SRPMS,BUILDROOT}
        cat > "${TOPDIR}/SPECS/virtci.spec" <<SPEC
        %global debug_package %{nil}
        %global __strip /bin/true
        %define _build_id_links none
        Name:        virtci
        Version:     ${VERSION}
        Release:     1
        Summary:     Virtual machine CI runner
        License:     GPL-2.0-only
        URL:         https://github.com/virtci/virtci
        BuildArch:   x86_64
        Requires:    qemu-kvm
        Requires:    qemu-img
        Requires:    swtpm
        AutoReqProv: no

        %description
        Virtual machine CI runner.

        %install
        mkdir -p %{buildroot}/usr/bin
        install -m 755 ${PWD}/target/release/virtci %{buildroot}/usr/bin/virtci

        %files
        /usr/bin/virtci
        SPEC
        rpmbuild --define "_topdir ${TOPDIR}" -bb "${TOPDIR}/SPECS/virtci.spec"
        cp "${TOPDIR}"/RPMS/x86_64/virtci-*.rpm virtci-linux-x64.rpm

    - name: Copy Files
      copy:
        from: vm:~/virtci-linux-x64.tar.gz
        to: ./

    - name: Copy .deb
      copy:
        from: vm:~/virtci-linux-x64.deb
        to: ./

    - name: Copy .rpm
      copy:
        from: vm:~/virtci-linux-x64.rpm
        to: ./
