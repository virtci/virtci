win-11-arm64:
    image: win-11-arm64
    cpus: 4
    memory: 12G
    steps:
    - name: Copy Files
      copy:
        from: ./
        to: vm:~/
        exclude:
            - .git
            - .github
            - docs
            - target

    - name: Install Chocolatey
      run: Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))

    - name: Install Rust
      run: curl -o rustup-init.exe https://win.rustup.rs/aarch64; .\rustup-init.exe -y

    - name: Install Dependencies
      run: choco install llvm -y

    - name: Install Node and NPM
      run: |
        curl -o node.msi https://nodejs.org/dist/v22.14.0/node-v22.14.0-arm64.msi
        msiexec /i node.msi /quiet /norestart

    - name: Install NPM Dependencies
      run: |
        $env:Path = "C:\Program Files\nodejs;$env:Path"
        cd web
        npm install

    - name: Build
      run: $env:Path = "C:\Program Files\nodejs;C:\Program Files\LLVM\bin;$env:Path"; cargo build --release

    - name: Package
      run: tar czf virtci-windows-arm64.tar.gz -C target/release virtci.exe

    - name: Copy Files
      copy:
        from: vm:~/virtci-windows-arm64.tar.gz
        to: ./
