[advisories]
unmaintained = "workspace"
yanked = "deny"

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSD-1-Clause",
  "BSL-1.0",
  "ISC",
  "CC0-1.0",
  "Unlicense",
  "MPL-2.0",
  "Unicode-3.0",
  "GPL-2.0-only",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
