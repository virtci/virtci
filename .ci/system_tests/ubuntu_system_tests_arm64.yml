ubuntu-system-tests-arm64:
  image: ubuntu-arm64
  cpus: 4
  memory: 12G
  steps:
    - name: Copy Files
      copy:
        from: ./
        to: vm:~/virtci
        exclude:
          - .git
          - .github
          - docs
          - target
          - .ci/upstream/*.img
          - .ci/temp

    - name: Fetch Ubuntu Images
      run: ./virtci/.ci/upstream/fetch_ubuntu_images.sh

    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

    - name: Install Node and NPM
      # https://nodejs.org/dist/v24.16.0/SHASUMS256.txt
      run: |
        set -euo pipefail
        NODE_VER=v24.16.0
        NODE_TARBALL=node-${NODE_VER}-linux-arm64.tar.xz
        NODE_SHA256=524659219d6a207a7400f2bde15d19ba060ffbe0d32a8643319ad67e3bb64c78
        curl --proto '=https' --tlsv1.2 -fsSLO "https://nodejs.org/dist/${NODE_VER}/${NODE_TARBALL}"
        echo "${NODE_SHA256}  ${NODE_TARBALL}" | shasum -a 256 -c -
        sudo tar -xJf "${NODE_TARBALL}" -C /usr/local --strip-components=1
        rm -f "${NODE_TARBALL}"

    - name: Verify npm Supports Release-Age Cooldown
      # npm must be >= 11.10.0 because that has `min-release-age`. Anything lower will just silently ignore, not acceptable.
      run: |
        set -euo pipefail
        node --version
        npm --version
        npm --version | awk -F. '($1<11)||($1==11 && $2<10){ print "npm "$0" is too old for min-release-age (need >= 11.10.0)"; exit 1 }'

    - name: Install NPM Dependencies
      workdir: virtci/web
      run: |
        npm ci

    - name: Install QEMU and UEFI Firmware
      run: sudo apt update && sudo apt install -y qemu-system-x86 qemu-system-arm qemu-system-riscv qemu-utils ovmf qemu-efi-aarch64 qemu-efi-riscv64

    - name: Fetch Cargo Dependencies
      workdir: virtci
      run: . "$HOME/.cargo/env" && cargo fetch

    - name: Go Offline and More Memory
      restart:
        offline: true
        memory: 16G

    - name: Build
      workdir: virtci
      run: . "$HOME/.cargo/env" && cargo build

    - name: Unit Tests
      workdir: virtci
      run: . "$HOME/.cargo/env" && cargo test

    - name: Go Online For Full CI/CD Workflow Run Tests
      restart:
        offline: false

    - name: Full CI/CD Workflow Run Tests
      workdir: virtci
      run: . "$HOME/.cargo/env" &&  cargo test --test ubuntu_vms_full_workflow_run -- --ignored --test-threads=1 --no-capture
