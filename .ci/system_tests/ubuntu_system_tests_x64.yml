ubuntu-system-tests-x64:
  image: ubuntu-server-x64
  cpus: 4
  memory: 12G
  steps:
    - name: Copy Files
      copy:
        from: ./
        to: vm:~/virtci
        exclude:
          - .git
          - .github
          - docs
          - target
          - .ci/upstream/*.img

    - name: Fetch Ubuntu Images
      run: ./virtci/.ci/upstream/fetch_ubuntu_images.sh

    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

    - name: Install Node NPM and Clang-Format
      run: |
        sudo apt update
        sudo apt install nodejs npm clang-format -y -qq

    - name: Install cargo-deny
      run: . "$HOME/.cargo/env" && cargo install cargo-deny

    - name: Install NPM Dependencies
      workdir: virtci/web
      run: |
        npm install

    - name: Install QEMU and UEFI Firmware
      run: sudo apt update && sudo apt install -y qemu-system-x86 qemu-system-arm qemu-system-misc qemu-utils ovmf qemu-efi-aarch64 qemu-efi-riscv64

    - name: Fetch Cargo Dependencies
      workdir: virtci
      run: . "$HOME/.cargo/env" && cargo fetch

    - name: Security and License Check
      workdir: virtci
      run: . "$HOME/.cargo/env" && cargo deny check

    - name: Go Offline and More Memory
      restart:
        offline: true
        memory: 16G

    - name: Check Formatting
      workdir: virtci
      run: |
        . "$HOME/.cargo/env"
        cargo fmt --check
        clang-format --dry-run --Werror src/**/*.c
      continue_on_error: true

    - name: Clippy
      workdir: virtci
      run: . "$HOME/.cargo/env" && cargo clippy -- -D warnings

    - name: Build
      workdir: virtci
      run: . "$HOME/.cargo/env" && cargo build

    - name: Unit Tests
      workdir: virtci
      run: . "$HOME/.cargo/env" && cargo test

    - name: Go Online For Full CI/CD Workflow Run Tests
      restart:
        offline: false

    - name: Full CI/CD Workflow Run Tests
      workdir: virtci
      run: . "$HOME/.cargo/env" &&  cargo test --test ubuntu_vms_full_workflow_run -- --ignored --test-threads=1 --no-capture
