macos-system-tests-arm64:
  image: mac-arm64
  cpus: 4
  memory: 12G
  steps:
    - name: Copy Files
      copy:
        from: ./
        to: vm:~/virtci
        exclude:
          - .git
          - .github
          - docs
          - target
          - .ci/upstream/*.img
          - .ci/temp

    - name: Fetch Ubuntu Images
      run: ./virtci/.ci/upstream/fetch_ubuntu_images.sh

    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

    - name: Install Node and NPM
      # https://nodejs.org/dist/v24.16.0/SHASUMS256.txt
      run: |
        set -euo pipefail
        NODE_VER=v24.16.0
        NODE_TARBALL=node-${NODE_VER}-darwin-arm64.tar.xz
        NODE_SHA256=e28ad5531b2aafe0ea555a51b2412c42fdc0f91a6a53fbd03ac93e3847e91389
        curl --proto '=https' --tlsv1.2 -fsSLO "https://nodejs.org/dist/${NODE_VER}/${NODE_TARBALL}"
        echo "${NODE_SHA256}  ${NODE_TARBALL}" | shasum -a 256 -c -
        sudo tar -xJf "${NODE_TARBALL}" -C /usr/local --strip-components=1
        rm -f "${NODE_TARBALL}"

    - name: Verify npm Supports Release-Age Cooldown
      # npm must be >= 11.10.0 because that has `min-release-age`. Anything lower will just silently ignore, not acceptable.
      run: |
        set -euo pipefail
        export PATH="/usr/local/bin:$PATH"
        node --version
        npm --version
        npm --version | awk -F. '($1<11)||($1==11 && $2<10){ print "npm "$0" is too old for min-release-age (need >= 11.10.0)"; exit 1 }'

    - name: Install QEMU and UEFI Firmware
      run: brew install qemu

    - name: Install NPM Dependencies
      workdir: virtci/web
      run: |
        export PATH="/usr/local/bin:$PATH"
        npm ci

    - name: Fetch Cargo Dependencies
      workdir: virtci
      run: . "$HOME/.cargo/env" && cargo fetch --locked

    - name: Go Offline and More Memory
      restart:
        offline: true
        memory: 16G

    - name: Build
      workdir: virtci
      run: |
        export PATH="/usr/local/bin:$PATH"
        . "$HOME/.cargo/env" && cargo build --locked

    - name: Unit Tests
      workdir: virtci
      run: . "$HOME/.cargo/env" && cargo test --locked

    - name: Go Online For Full CI/CD Workflow Run Tests
      restart:
        offline: false

    - name: Full CI/CD Workflow Run Tests
      workdir: virtci
      run: . "$HOME/.cargo/env" &&  cargo test --locked --test ubuntu_vms_full_workflow_run -- --ignored --test-threads=1 --no-capture

    - name: Go Offline For Cache Generation Tests
      restart:
        offline: true

    - name: Workflow Run Local Workflow Cache Tests
      workdir: virtci
      run: . "$HOME/.cargo/env" &&  cargo test --locked --test local_workflow_cache -- --ignored --test-threads=1 --no-capture
