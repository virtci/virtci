windows-system-tests-arm64:
  image: win-11-arm64
  cpus: 4
  memory: 12G
  steps:
    - name: Copy Files
      copy:
        from: ./
        to: vm:~/virtci
        exclude:
          - .git
          - .github
          - docs
          - target
          - .ci/upstream/*.img
          - .ci/temp

    - name: Fetch Ubuntu Images
      run: |
        Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
        .\virtci\.ci\upstream\fetch_ubuntu_images.ps1

    - name: Install Rust
      run: winget install Rustlang.Rustup --silent

    - name: Install Node and NPM
      # https://nodejs.org/dist/v24.16.0/SHASUMS256.txt
      run: |
        $ErrorActionPreference = "Stop"
        $ProgressPreference = "SilentlyContinue"
        $NodeVer = "v24.16.0"
        $NodeZip = "node-$NodeVer-win-arm64.zip"
        $NodeSha256 = "14834611d4c6b3c06054e7007732b90474c16e0b32f395e05b55a571ef71c6d2"
        $dest = Join-Path $env:TEMP $NodeZip
        & curl.exe --proto "=https" --tlsv1.2 -fsSL --retry 3 --retry-delay 2 -o $dest "https://nodejs.org/dist/$NodeVer/$NodeZip"
        if ($LASTEXITCODE -ne 0) { throw "Failed to download Node (curl exit $LASTEXITCODE)." }
        $actual = (Get-FileHash $dest -Algorithm SHA256).Hash
        if ($actual -ne $NodeSha256) { throw "Node SHA256 mismatch: expected $NodeSha256, got $actual" }
        Expand-Archive -Path $dest -DestinationPath "C:\nodejs" -Force
        Remove-Item $dest
        $NodeDir = "C:\nodejs\node-$NodeVer-win-arm64"
        [Environment]::SetEnvironmentVariable('Path', [Environment]::GetEnvironmentVariable('Path', 'Machine') + ";$NodeDir", 'Machine')

    - name: Verify npm Supports Release-Age Cooldown
      # npm must be >= 11.10.0 because that has `min-release-age`. Anything lower will just silently ignore, not acceptable.
      run: |
        Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
        $ErrorActionPreference = "Stop"
        node --version
        $npm = (npm --version).Trim()
        Write-Host "npm $npm"
        $p = $npm.Split('.')
        if ([int]$p[0] -lt 11 -or ([int]$p[0] -eq 11 -and [int]$p[1] -lt 10)) {
            throw "npm $npm is too old for min-release-age (need >= 11.10.0)"
        }

    - name: Install Git
      run: winget install -e --id Git.Git

    - name: Install NPM Dependencies
      workdir: virtci/web
      run: |
        Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass
        npm ci

    - name: Install QEMU and UEFI Firmware
      # winget only has x64 binaries, which install fine under Prism emulation but crash in
      # the Windows unwinder (no stderr!) the moment TCG executes guest code. Fetch the
      # native Windows-on-ARM build instead. Year-archive URL so newer uploads don't 404 it.
      run: |
        $ErrorActionPreference = "Stop"
        $ProgressPreference = "SilentlyContinue"
        $installer = Join-Path $env:TEMP "qemu-arm-setup-20260422.exe"
        & curl.exe -L --fail --retry 3 --retry-delay 2 -o $installer "https://qemu.weilnetz.de/aarch64/2026/qemu-arm-setup-20260422.exe"
        if ($LASTEXITCODE -ne 0) {
            throw "Failed to download QEMU installer (curl exit $LASTEXITCODE)."
        }
        if ((Get-FileHash $installer -Algorithm SHA512).Hash -ne $env:QEMU_ARM_SHA512) {
            throw "QEMU installer SHA512 hash did not match the downloaded file."
        }
        Start-Process -FilePath $installer -ArgumentList "/S" -Wait
        # ENSURE it's not x86_64. Must have 0xAA64 not 0x8664.
        $exe = "C:\Program Files\qemu\qemu-system-aarch64.exe"
        $fs = [IO.File]::OpenRead($exe)
        $hdr = New-Object byte[] 4096
        $null = $fs.Read($hdr, 0, $hdr.Length)
        $fs.Dispose()
        $machine = [BitConverter]::ToUInt16($hdr, [BitConverter]::ToInt32($hdr, 0x3C) + 4)
        if ($machine -ne 0xAA64) {
            throw ("QEMU at $exe is not a native ARM64 binary (PE machine 0x{0:X4}). TCG crashes under x64 emulation." -f $machine)
        }
      env:
        QEMU_ARM_SHA512: 67ca24c6b07ecb74848f5c1078db7dc71e4e3ffe1669ef713c34184d322fb6bfbf72f1c9ca028a42212af9b157e46ef806f2e43083b2a9e51a351bd961885288

    - name: Go Offline and More Memory
      restart:
        offline: true
        memory: 16G

    - name: Build
      workdir: virtci
      run: |
        Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
        cargo build

    - name: Unit Tests
      workdir: virtci
      run: cargo test

    - name: Go Online For Full CI/CD Workflow Run Tests
      restart:
        offline: false

    - name: Full CI/CD Workflow Run Tests
      workdir: virtci
      run: cargo test --test ubuntu_vms_full_workflow_run -- --ignored --test-threads=1 --no-capture
