windows-system-tests-x64:
  image: win-11-x64
  cpus: 4
  memory: 12G
  steps:
    - name: Copy Files
      copy:
        from: ./
        to: vm:~/virtci
        exclude:
          - .git
          - .github
          - docs
          - target
          - .ci/upstream/*.img
          - .ci/temp

    - name: Fetch Ubuntu Images
      run: |
        Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
        .\virtci\.ci\upstream\fetch_ubuntu_images.ps1

    - name: Install Rust
      run: winget install Rustlang.Rustup --silent

    - name: Install Node and NPM
      # https://nodejs.org/dist/v24.16.0/SHASUMS256.txt
      run: |
        $ErrorActionPreference = "Stop"
        $ProgressPreference = "SilentlyContinue"
        $NodeVer = "v24.16.0"
        $NodeZip = "node-$NodeVer-win-x64.zip"
        $NodeSha256 = "edaca9bd58ec8e92037dac4e877d52f6b8f430b81c18b57e264b4e2fb111cd56"
        $dest = Join-Path $env:TEMP $NodeZip
        & curl.exe --proto "=https" --tlsv1.2 -fsSL --retry 3 --retry-delay 2 -o $dest "https://nodejs.org/dist/$NodeVer/$NodeZip"
        if ($LASTEXITCODE -ne 0) { throw "Failed to download Node (curl exit $LASTEXITCODE)." }
        $actual = (Get-FileHash $dest -Algorithm SHA256).Hash
        if ($actual -ne $NodeSha256) { throw "Node SHA256 mismatch: expected $NodeSha256, got $actual" }
        Expand-Archive -Path $dest -DestinationPath "C:\nodejs" -Force
        Remove-Item $dest
        $NodeDir = "C:\nodejs\node-$NodeVer-win-x64"
        [Environment]::SetEnvironmentVariable('Path', [Environment]::GetEnvironmentVariable('Path', 'Machine') + ";$NodeDir", 'Machine')

    - name: Verify npm Supports Release-Age Cooldown
      # npm must be >= 11.10.0 because that has `min-release-age`. Anything lower will just silently ignore, not acceptable.
      run: |
        Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
        $ErrorActionPreference = "Stop"
        node --version
        $npm = (npm --version).Trim()
        Write-Host "npm $npm"
        $p = $npm.Split('.')
        if ([int]$p[0] -lt 11 -or ([int]$p[0] -eq 11 -and [int]$p[1] -lt 10)) {
            throw "npm $npm is too old for min-release-age (need >= 11.10.0)"
        }

    - name: Install NPM Dependencies
      workdir: virtci/web
      run: |
        Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass
        npm ci

    - name: Install QEMU and UEFI Firmware
      # winget only has x64 binaries seemingly
      run: winget install -e --id SoftwareFreedomConservancy.QEMU

    - name: Fetch Cargo Dependencies
      workdir: virtci
      run: cargo fetch --locked

    - name: Go Offline and More Memory
      restart:
        offline: true
        memory: 16G

    - name: Build
      workdir: virtci
      run: |
        Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
        cargo build --locked

    - name: Unit Tests
      workdir: virtci
      run: cargo test --locked

    - name: Go Online For Full CI/CD Workflow Run Tests
      restart:
        offline: false

    - name: Full CI/CD Workflow Run Tests
      workdir: virtci
      run: cargo test --locked --test ubuntu_vms_full_workflow_run -- --ignored --test-threads=1 --no-capture

    - name: Try Windows Reset Fix
      run: |
        Set-NetConnectionProfile -NetworkCategory Private -ErrorAction SilentlyContinue
        Set-NetFirewallProfile -Profile Domain,Private,Public -Enabled False

    - name: Go Offline For Cache Generation Tests
      restart:
        offline: true

    - name: Workflow Run Local Workflow Cache Tests
      workdir: virtci
      run: cargo test --locked --test local_workflow_cache -- --ignored --test-threads=1 --no-capture
