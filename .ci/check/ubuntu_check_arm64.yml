ubuntu-check-arm64:
  image: ubuntu-arm64
  cpus: 2
  memory: 6G
  steps:
    - name: Copy Files
      copy:
        from: ./
        to: vm:~/virtci
        exclude:
          - .git
          - .github
          - docs
          - target
          - .ci/upstream/*.img
          - .ci/temp

    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

    - name: Install Node and NPM
      # https://nodejs.org/dist/v24.16.0/SHASUMS256.txt
      run: |
        set -euo pipefail
        NODE_VER=v24.16.0
        NODE_TARBALL=node-${NODE_VER}-linux-arm64.tar.xz
        NODE_SHA256=524659219d6a207a7400f2bde15d19ba060ffbe0d32a8643319ad67e3bb64c78
        curl --proto '=https' --tlsv1.2 -fsSLO "https://nodejs.org/dist/${NODE_VER}/${NODE_TARBALL}"
        echo "${NODE_SHA256}  ${NODE_TARBALL}" | shasum -a 256 -c -
        sudo tar -xJf "${NODE_TARBALL}" -C /usr/local --strip-components=1
        rm -f "${NODE_TARBALL}"

    - name: Verify npm Supports Release-Age Cooldown
      # npm must be >= 11.10.0 because that has `min-release-age`. Anything lower will just silently ignore, not acceptable.
      run: |
        set -euo pipefail
        node --version
        npm --version
        npm --version | awk -F. '($1<11)||($1==11 && $2<10){ print "npm "$0" is too old for min-release-age (need >= 11.10.0)"; exit 1 }'

    - name: Install clang-format
      run: sudo apt update && sudo apt install -y clang-format

    - name: Install cargo-deny
      run: . "$HOME/.cargo/env" && cargo install cargo-deny

    - name: Fetch Cargo Dependencies
      workdir: virtci
      run: . "$HOME/.cargo/env" && cargo fetch

    - name: Rust Security and License Audit
      workdir: virtci
      run: . "$HOME/.cargo/env" && cargo deny check

    - name: Install NPM Dependencies (locked, scripts blocked)
      workdir: virtci/web
      run: npm ci

    - name: NPM Provenance and Signature Audit
      workdir: virtci/web
      run: npm audit signatures

    - name: NPM Vulnerability Audit
      workdir: virtci/web
      run: npm audit --audit-level=moderate

    - name: Web Lint and Build
      workdir: virtci/web
      run: |
        npm run lint
        npm run build

    - name: Clippy
      workdir: virtci
      run: . "$HOME/.cargo/env" && cargo clippy -- -D warnings

    - name: Check Formatting
      workdir: virtci
      run: |
        . "$HOME/.cargo/env"
        cargo fmt --check
        find src -name '*.c' -exec clang-format --dry-run --Werror {} +
      continue_on_error: true
