name: LLM Analysis

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#permissions
  contents: read # read repo
  pull-requests: write # post comments

jobs:
  virtci-llm-analysis:
    # Skip LLM analysis for fork PRs for now. Open to changing in the future, putting in a separate
    # workflow YAML file under pull_request_target with HIGHLY specific checkout settings.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on:
      - self-hosted
      - Linux
      - X64
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Generate diff
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git diff origin/${{ github.base_ref }}...HEAD > diff.txt
          elif [ "${{ github.event_name }}" == "push" ]; then
            # Diff the full push range, not just the tip commit. Fall back to
            # HEAD~1 when 'before' is unusable (force-push to a deleted commit,
            # or the all-zeros sha of a newly created branch).
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$BEFORE" 2>/dev/null; then
              git diff "$BEFORE"..HEAD > diff.txt
            else
              git diff HEAD~1 > diff.txt
            fi
          else
            git diff HEAD~1 > diff.txt
          fi

      - name: Create empty PR Comments file
        if: github.event_name != 'pull_request'
        run: echo "## PR Comments (not a PR event)" > pr-comments.md

      - name: Fetch PR Comments
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          PR_NUM=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          ERRORS=$(mktemp)
          # On any fetch failure fall back to an annotated pr-comments.md, warn, and
          # exit 0 so the review still runs with the fallback file.
          trap 'if [ -s "$ERRORS" ]; then { echo "## PR Comments (error fetching)"; echo ""; cat "$ERRORS"; } > pr-comments.md; echo "::warning::PR comment fetch failed: $(tr "\n" " " < "$ERRORS")"; fi; rm -f "$ERRORS"; exit 0' EXIT

          {
            gh pr view "$PR_NUM" --json title,body --jq '"## PR Title\n\n" + .title + "\n\n## PR Body\n\n" + (.body // "")' 2>>"$ERRORS" || { echo "FAILED: gh pr view title/body" >> "$ERRORS"; exit 1; }
            echo ""
            echo "## Review Comments"
            echo ""
            COMMENTS=$(gh api --paginate repos/$REPO/pulls/$PR_NUM/comments --jq '.[] | "### " + "@\(.user.login)" + " on \(.path):\(.line // .position // "unknown")" + "\n---\n" + .body' 2>>"$ERRORS") || { echo "FAILED: fetch review comments" >> "$ERRORS"; exit 1; }
            if [ -z "$COMMENTS" ]; then
              echo "No review comments on this PR."
            else
              echo "$COMMENTS"
            fi
            echo ""
            echo "## Issue Comments"
            echo ""
            ISSUES=$(gh api --paginate repos/$REPO/issues/$PR_NUM/comments --jq '.[] | "### " + "@\(.user.login)" + "\n---\n" + .body' 2>>"$ERRORS") || { echo "FAILED: fetch issue comments" >> "$ERRORS"; exit 1; }
            if [ -z "$ISSUES" ]; then
              echo "No issue comments on this PR."
            else
              echo "$ISSUES"
            fi
          } > pr-comments.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Pull OpenCode image
        run: docker pull -q ghcr.io/anomalyco/opencode:latest

      - name: Run OpenCode Review
        id: llm_analysis
        continue-on-error: true
        env:
          # https://opencode.ai/docs/config/ -- no GITHUB_TOKEN in container; diff is pre-generated at /workspace/diff.txt
          # --network none cannot be used: Ollama requires host.docker.internal connectivity.
          # All other available isolation is applied instead.
          # https://github.com/anomalyco/opencode
          LLAMA_CPP_API_KEY: ${{ secrets.LLAMA_CPP_API_KEY }}
          OPENCODE_CONFIG_CONTENT: '{"$schema":"https://opencode.ai/config.json","provider":{"llamacpp":{"npm":"@ai-sdk/openai-compatible","name":"llama.cpp","options":{"baseURL":"http://host.docker.internal:11433/v1","apiKey":"{env:LLAMA_CPP_API_KEY}","timeout":900000,"chunkTimeout":180000},"models":{"default":{"name":"llama.cpp default"}}}},"compaction":{"auto":true,"prune":true,"reserved":15000},"permission":{"read":"allow","glob":"allow","grep":"allow","list":"deny","lsp":"deny","codesearch":"deny","edit":"deny","bash":"deny","task":"deny","skill":"deny","webfetch":"deny","websearch":"deny","question":"deny","external_directory":"deny","doom_loop":"deny"}}'
          CONTAINER_NAME: virtci-opencode-review-${{ github.run_id }}
        run: |
          set +e

          PROMPT=$(cat <<'PROMPT_END'
          You are reviewing a diff for VirtCI: a self-hosted CI/CD runner that orchestrates real OS VMs across multiple CPU architectures. The Rust backend drives QEMU and Tart (macOS arm64 only) VM lifecycles, exposes S3-compatible storage APIs, and is paired with a React/TypeScript frontend. Targets Linux, macOS, and Windows hosts.

          The diff to review is in the attached file diff.txt. Treat it as the complete change set.

          PR context (title, body, review comments, issue comments) is in the attached file pr-comments.md. Consider any existing review feedback when forming your analysis -- avoid repeating issues already raised, and acknowledge concerns that align with your findings.

          This is a one-shot review. There is no user to respond to. Your final message must contain exactly these four sections and nothing else:

          ## Critical Issues
          ## Potential Issues
          ## Suggestions
          ## Summary

          Cite file:line for each finding. Write "None found" for empty sections. Any other output is a failure. Do not ask questions. Do not request approval. Do not request next steps. Do not propose to apply the diff.

          You may use Read, Glob, or Grep to look up source files referenced by the diff if you need additional context, BUT you have a hard budget of at most 8 tool calls total across the entire review. After 8 tool calls (or sooner) you must immediately write the four sections, do not exceed this budget under any circumstances. Do not create todo lists, multi-step plans, or staged work. Do not attempt to Read or page through diff.txt, its contents are already attached.

          Constraints (do not flag these as issues):
          - Spawning QEMU, Tart, swtpm, or other VM-backend processes is by design
          - Platform-conditional code (cfg(target_os = ...), powershell scripts for Windows) is expected
          - unwrap()/expect() in tests, build scripts, and example workflows is acceptable
          - unsafe blocks for FFI or low-level VM/process control are acceptable when contained

          Focus on:
          - Rust correctness: panics on untrusted input, unsoundness in unsafe, lifetime/borrow bugs, Send/Sync violations
          - Async issues: blocking calls inside async (std::fs, std::process, sync Mutex held across .await), tokio task leaks, deadlocks
          - VM and process lifecycle: leaked child processes (QEMU/Tart/swtpm), missing cleanup on error paths, orphaned VM clones, zombie pids
          - Command injection when building QEMU/Tart/shell argv from user-controlled input
          - Path traversal in workflow file copies (vm:~/ steps), workspace handling, or storage layer
          - Secret handling: host_env opt-in leakage, secrets logged or persisted to disk, secrets in error messages
          - S3 API surface: auth/signature checks, request validation, multipart upload state, range request bounds
          - Cross-platform breakage: hardcoded path separators, POSIX-only syscalls used on Windows paths, symlink/permission assumptions
          - React/TypeScript: XSS via dangerouslySetInnerHTML or unescaped backend strings, missing auth on API calls, unsafe deserialization
          - Resource exhaustion not bounded: unbounded channels, unbounded VM clones, missing disk-quota checks

          Do not report:
          - Naming, formatting, or rustfmt/clippy-style nits
          - Suggestions to add abstraction layers, traits, or generics
          - Missing doc comments
          - Test coverage gaps unless the change clearly breaks an existing tested invariant
          - Generic "consider using crate X instead" suggestions

          Output the four sections now and stop.
          PROMPT_END
          )

          # add `--print-logs --log-level DEBUG \` before run to get debug logs

          # Handle GitHub cancellation.
          trap 'docker kill "$CONTAINER_NAME" >/dev/null 2>&1 || true' INT TERM

          timeout --preserve-status --signal=TERM --kill-after=30s 840 \
            docker run --rm --name "$CONTAINER_NAME" \
              --add-host=host.docker.internal:host-gateway \
              --user 65534:65534 \
              --cap-drop ALL \
              --security-opt no-new-privileges:true \
              --read-only \
              --tmpfs /tmp:rw,nosuid,size=2g,mode=1777 \
              --pids-limit 64 \
              --memory 8g \
              -v "${{ github.workspace }}:/workspace:ro" \
              -w /workspace \
              -e HOME=/tmp \
              -e XDG_DATA_HOME=/tmp/.local/share \
              -e OPENCODE_CONFIG_CONTENT \
              -e LLAMA_CPP_API_KEY \
              ghcr.io/anomalyco/opencode:latest \
              --print-logs --log-level DEBUG \
              run \
                 "$PROMPT" \
                 --file /workspace/diff.txt \
                 --file /workspace/pr-comments.md \
                 --model llamacpp/default \
            2> >(tee opencode-debug.log >&2) | tee llm-analysis-raw.md
          EXIT=${PIPESTATUS[0]}
          echo "opencode exit code: $EXIT"
          if [ "$EXIT" = "143" ] || [ "$EXIT" = "124" ]; then
            echo "::warning::opencode timed out (exit $EXIT)"
          fi
          echo "llm_exit=$EXIT" >> "$GITHUB_OUTPUT"
          exit "$EXIT"

      - name: Generate report
        id: report
        if: always()
        run: |
          touch llm-analysis-raw.md
          echo "raw output size: $(wc -c < llm-analysis-raw.md) bytes"

          sed 's/\x1b\[[0-9;]*[a-zA-Z]//g' llm-analysis-raw.md > llm-analysis-clean.md

          if grep -q '^## Critical Issues' llm-analysis-clean.md; then
            sed -n '/^## Critical Issues/,$p' llm-analysis-clean.md > llm-analysis.md
            echo "structured=true" >> "$GITHUB_OUTPUT"
          else
            echo "structured=false" >> "$GITHUB_OUTPUT"
            {
              echo "## LLM Analysis (structured report not produced)"
              echo ""
              echo "The model did not output the expected sections"
              echo ""
              echo "- exit code: \`${{ steps.llm_analysis.outputs.llm_exit }}\`"
              echo ""
              echo "Raw output tail:"
              echo ""
              echo '```'
              tail -c 4000 llm-analysis-clean.md
              echo '```'
            } > llm-analysis.md
          fi

      - name: Show raw opencode output
        if: always()
        run: cat llm-analysis-raw.md

      - name: Cleanup container
        if: always()
        run: docker rm -f "virtci-opencode-review-${{ github.run_id }}" 2>/dev/null || true

      - name: Post PR Comment
        if: github.event_name == 'pull_request' && steps.llm_analysis.outcome == 'success' && steps.report.outputs.structured == 'true'
        continue-on-error: true
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file llm-analysis.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Add to Job Summary
        if: always()
        continue-on-error: true
        run: |
          cat llm-analysis.md >> "$GITHUB_STEP_SUMMARY"
          {
            echo ""
            echo "<details><summary>Raw opencode output</summary>"
            echo ""
            echo '```'
            cat llm-analysis-raw.md
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Analysis Artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: llm-analysis-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            llm-analysis.md
            llm-analysis-raw.md
            opencode-debug.log
          if-no-files-found: ignore

      - name: Post Warning on Failure
        if: ${{ !cancelled() && (steps.llm_analysis.outcome != 'success' || steps.report.outputs.structured != 'true') }}
        continue-on-error: true
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body "**LLM Analysis Warning**: The analysis didn't complete or produced an unstructured report (see the run's job summary and artifacts). This is non-blocking and doesn't affect PR approval."
          else
            echo "::warning::LLM analysis didn't complete for this ${{ github.event_name }} event."
          fi
        env:
          GH_TOKEN: ${{ github.token }}
