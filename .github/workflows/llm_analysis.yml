name: LLM Analysis

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#permissions
  contents: read # read repo
  pull-requests: write # post comments

jobs:
  virtci-llm-analysis:
    # Skip LLM analysis for fork PRs for now. Open to changing in the future, putting in a separate
    # workflow YAML file under pull_request_target with HIGHLY specific checkout settings.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on:
      - self-hosted
      - Linux
      - X64
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Generate diff
        # -U15 gives the model generous surrounding context, reducing how much
        # source it needs to request in pass 1.
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git diff -U15 origin/${{ github.base_ref }}...HEAD > diff.txt
          elif [ "${{ github.event_name }}" == "push" ]; then
            # Diff the full push range, not just the tip commit. Fall back to
            # HEAD~1 when 'before' is unusable (force-push to a deleted commit,
            # or the all-zeros sha of a newly created branch).
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$BEFORE" 2>/dev/null; then
              git diff -U15 "$BEFORE"..HEAD > diff.txt
            else
              git diff -U15 HEAD~1 > diff.txt
            fi
          else
            git diff -U15 HEAD~1 > diff.txt
          fi

      - name: Create empty PR Comments file
        if: github.event_name != 'pull_request'
        run: echo "## PR Comments (not a PR event)" > pr-comments.md

      - name: Fetch PR Comments
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          PR_NUM=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          ERRORS=$(mktemp)
          # On any fetch failure fall back to an annotated pr-comments.md, warn, and
          # exit 0 so the review still runs with the fallback file.
          trap 'if [ -s "$ERRORS" ]; then { echo "## PR Comments (error fetching)"; echo ""; cat "$ERRORS"; } > pr-comments.md; echo "::warning::PR comment fetch failed: $(tr "\n" " " < "$ERRORS")"; fi; rm -f "$ERRORS"; exit 0' EXIT

          {
            gh pr view "$PR_NUM" --json title,body --jq '"## PR Title\n\n" + .title + "\n\n## PR Body\n\n" + (.body // "")' 2>>"$ERRORS" || { echo "FAILED: gh pr view title/body" >> "$ERRORS"; exit 1; }
            echo ""
            echo "## Review Comments"
            echo ""
            COMMENTS=$(gh api --paginate repos/$REPO/pulls/$PR_NUM/comments --jq '.[] | "### " + "@\(.user.login)" + " on \(.path):\(.line // .position // "unknown")" + "\n---\n" + .body' 2>>"$ERRORS") || { echo "FAILED: fetch review comments" >> "$ERRORS"; exit 1; }
            if [ -z "$COMMENTS" ]; then
              echo "No review comments on this PR."
            else
              echo "$COMMENTS"
            fi
            echo ""
            echo "## Issue Comments"
            echo ""
            ISSUES=$(gh api --paginate repos/$REPO/issues/$PR_NUM/comments --jq '.[] | "### " + "@\(.user.login)" + "\n---\n" + .body' 2>>"$ERRORS") || { echo "FAILED: fetch issue comments" >> "$ERRORS"; exit 1; }
            if [ -z "$ISSUES" ]; then
              echo "No issue comments on this PR."
            else
              echo "$ISSUES"
            fi
          } > pr-comments.md
        env:
          GH_TOKEN: ${{ github.token }}

      # 3 direct calls to llama.cpp server, no agent.
      # Pass 1: Thinking off, json_schema. Model maps the relevant source files.
      # Pass 2: Thinking on, free-form. Review of the diff and the provided context.
      # Pass 3: Thinking off, json_schema. Generate proper report.
      - name: Run LLM Review
        id: llm_analysis
        continue-on-error: true
        env:
          LLAMA_CPP_API_KEY: ${{ secrets.LLAMA_CPP_API_KEY }}
          LLAMA_API_URL: http://localhost:11433/v1/chat/completions
        run: |
          set +e

          command -v jq >/dev/null 2>&1 || { echo "::error::jq is required on the runner"; echo "llm_exit=1" >> "$GITHUB_OUTPUT"; exit 1; }

          fail() {
            echo "::warning::LLM review failed: $1"
            echo "LLM review failed: $1" > llm-analysis-raw.md
            echo "llm_exit=1" >> "$GITHUB_OUTPUT"
            exit 1
          }

          # $1: request body file, $2: response file, $3: timeout seconds
          llm_call() {
            local code
            code=$(curl -sS --max-time "$3" -w '%{http_code}' \
              -H "Authorization: Bearer $LLAMA_CPP_API_KEY" \
              -H "Content-Type: application/json" \
              -d @"$1" -o "$2" "$LLAMA_API_URL") || return 1
            if [ "$code" != "200" ]; then
              echo "::warning::llama-server returned HTTP $code: $(head -c 300 "$2" 2>/dev/null)"
              return 1
            fi
          }

          # Keep the prompt comfortably within the model's 128k context even for huge diffs.
          if [ "$(wc -c < diff.txt)" -gt 262144 ]; then
            head -c 262144 diff.txt > diff-capped.txt
            printf '\n\n[diff truncated at 256KB for context-window safety]\n' >> diff-capped.txt
            mv diff-capped.txt diff.txt
            echo "::warning::diff.txt truncated to 256KB"
          fi

          ########################## PASS 1: context request ##########################
          # Repo map: lets the model pick real paths instead of guessing them.
          git ls-files | head -n 4000 > repo-files.txt

          PASS1_PROMPT=$(cat <<'P1_END'
          You are preparing to review a code diff for VirtCI: a self-hosted CI/CD runner that orchestrates real OS VMs across multiple CPU architectures. The Rust backend (under src/) drives QEMU and Tart VM lifecycles and exposes S3-compatible storage APIs; the React/TypeScript frontend lives under web/.

          The complete list of repository files and the diff are attached below. To review the diff well you may need surrounding source context. List up to 8 repository files (with optional 1-based line ranges) you want to read -- prefer call sites, definitions, and modules referenced by the diff. Choose paths only from the repository file list. If the diff is self-contained, return an empty files array.

          Respond with JSON only, matching: {"files":[{"path":"src/example.rs","start_line":1,"end_line":200}]}
          P1_END
          )

          jq -n --rawfile diff diff.txt --rawfile repolist repo-files.txt --arg prompt "$PASS1_PROMPT" '{
            messages: [{role: "user", content: ($prompt + "\n\n# repository file list\n\n" + $repolist + "\n\n# diff.txt\n\n" + $diff)}],
            chat_template_kwargs: {enable_thinking: false},
            temperature: 0.3,
            max_tokens: 1024,
            response_format: {type: "json_schema", json_schema: {name: "context_request", schema: {
              type: "object",
              properties: {files: {type: "array", maxItems: 8, items: {
                type: "object",
                properties: {
                  path: {type: "string"},
                  start_line: {type: "integer", minimum: 1},
                  end_line: {type: "integer", minimum: 1}
                },
                required: ["path"]
              }}},
              required: ["files"]
            }}}
          }' > pass1-request.json || fail "building pass 1 request"

          echo "Pass 1: requesting context file list"
          if llm_call pass1-request.json pass1-response.json 120 \
             && jq -e '.choices[0].message.content | fromjson | .files' pass1-response.json > /dev/null 2>&1; then
            jq '.choices[0].message.content | fromjson | {files: .files[:8]}' pass1-response.json > files-requested.json
          else
            # Pass 1 is best-effort: a failure here degrades the review, not kills it.
            echo "::warning::pass 1 failed; continuing without extra source context"
            echo '{"files":[]}' > files-requested.json
          fi

          # Materialize the requested context. The script -- not the model -- enforces
          # the budget: workspace-only paths, no .git (checkout credentials live there),
          # text files only, max 400 lines per file.
          : > context.txt
          while IFS=$'\t' read -r path start end; do
            real=$(realpath -m -- "$path" 2>/dev/null) || continue
            case "$real" in
              "$GITHUB_WORKSPACE/.git"|"$GITHUB_WORKSPACE/.git/"*) continue ;;
              "$GITHUB_WORKSPACE"/*) ;;
              *) continue ;;
            esac
            [ -f "$real" ] || continue
            grep -Iq . "$real" 2>/dev/null || continue
            total=$(wc -l < "$real")
            s=$(( start > 0 ? start : 1 ))
            e=$(( end >= s ? end : s + 399 ))
            [ $(( e - s )) -gt 399 ] && e=$(( s + 399 ))
            [ "$e" -gt "$total" ] && e=$total
            {
              echo "=== ${real#"$GITHUB_WORKSPACE"/} (lines $s-$e of $total) ==="
              sed -n "${s},${e}p" "$real"
              echo ""
            } >> context.txt
          done < <(jq -r '.files[] | [.path, (.start_line // 0), (.end_line // 0)] | @tsv' files-requested.json)
          truncate -s '<300K' context.txt 2>/dev/null || true
          echo "context.txt: $(wc -c < context.txt) bytes from $(jq '.files | length' files-requested.json) requested files"

          ########################## PASS 2: deep analysis ##########################
          PASS2_PROMPT=$(cat <<'P2_END'
          You are reviewing a diff for VirtCI: a self-hosted CI/CD runner that orchestrates real OS VMs across multiple CPU architectures. The Rust backend drives QEMU and Tart (macOS arm64 only) VM lifecycles, exposes S3-compatible storage APIs, and is paired with a React/TypeScript frontend. Targets Linux, macOS, and Windows hosts.

          The diff (the complete change set), PR context (title, body, review comments, issue comments), and source context you previously requested are attached below. Consider any existing review feedback -- avoid repeating issues already raised, and acknowledge concerns that align with your findings.

          Analyze the change set thoroughly and write out your complete analysis: every candidate issue with file:line and a severity (critical / potential / suggestion), the checks you performed that came up clean, and a brief overall assessment. Your analysis will be converted into a structured report by a later step, so completeness and correctness matter more than formatting. Budget your reasoning: leave enough of your token allowance to write the analysis itself as regular output before running out.

          Constraints (do not flag these as issues):
          - Spawning QEMU, Tart, swtpm, or other VM-backend processes is by design
          - Platform-conditional code (cfg(target_os = ...), powershell scripts for Windows) is expected
          - unwrap()/expect() in tests, build scripts, and example workflows is acceptable
          - unsafe blocks for FFI or low-level VM/process control are acceptable when contained

          Focus on:
          - Rust correctness: panics on untrusted input, unsoundness in unsafe, lifetime/borrow bugs, Send/Sync violations
          - Async issues: blocking calls inside async (std::fs, std::process, sync Mutex held across .await), tokio task leaks, deadlocks
          - VM and process lifecycle: leaked child processes (QEMU/Tart/swtpm), missing cleanup on error paths, orphaned VM clones, zombie pids
          - Command injection when building QEMU/Tart/shell argv from user-controlled input
          - Path traversal in workflow file copies (vm:~/ steps), workspace handling, or storage layer
          - Secret handling: host_env opt-in leakage, secrets logged or persisted to disk, secrets in error messages
          - S3 API surface: auth/signature checks, request validation, multipart upload state, range request bounds
          - Cross-platform breakage: hardcoded path separators, POSIX-only syscalls used on Windows paths, symlink/permission assumptions
          - React/TypeScript: XSS via dangerouslySetInnerHTML or unescaped backend strings, missing auth on API calls, unsafe deserialization
          - Resource exhaustion not bounded: unbounded channels, unbounded VM clones, missing disk-quota checks

          Do not report:
          - Naming, formatting, or rustfmt/clippy-style nits
          - Suggestions to add abstraction layers, traits, or generics
          - Missing doc comments
          - Test coverage gaps unless the change clearly breaks an existing tested invariant
          - Generic "consider using crate X instead" suggestions
          P2_END
          )

          jq -n --rawfile diff diff.txt --rawfile pr pr-comments.md --rawfile ctx context.txt --arg prompt "$PASS2_PROMPT" '{
            messages: [{role: "user", content: ($prompt + "\n\n# diff.txt\n\n" + $diff + "\n\n# pr-comments.md\n\n" + $pr + "\n\n# requested source context\n\n" + $ctx)}],
            temperature: 0.6,
            top_p: 0.95,
            max_tokens: 12288
          }' > pass2-request.json || fail "building pass 2 request"

          echo "Pass 2: deep analysis (thinking enabled)"
          llm_call pass2-request.json pass2-response.json 600 || fail "pass 2 API call"
          jq -r '.choices[0].message.reasoning_content // ""' pass2-response.json > pass2-reasoning.md
          jq -r '.choices[0].message.content // ""' pass2-response.json > pass2-content.md
          echo "pass 2: $(wc -c < pass2-reasoning.md) bytes reasoning, $(wc -c < pass2-content.md) bytes content, finish_reason: $(jq -r '.choices[0].finish_reason' pass2-response.json)"
          if [ ! -s pass2-reasoning.md ] && [ ! -s pass2-content.md ]; then
            fail "pass 2 returned no analysis"
          fi

          ###################### PASS 3: structured transcription ######################
          PASS3_PROMPT=$(cat <<'P3_END'
          Below are an analyst's complete notes (their reasoning followed by their conclusions) from reviewing a diff for VirtCI, then the diff itself. Produce the final structured review.

          Rules: base every finding strictly on the analyst's notes -- do not invent new findings, and drop anything the analyst investigated and dismissed as fine. Each finding must be one self-contained string citing file:line. Use empty arrays for sections with no findings. The summary is 2-4 sentences.

          Respond with JSON only, matching: {"critical_issues":["src/foo.rs:42 -- description"],"potential_issues":[],"suggestions":[],"summary":"..."}
          P3_END
          )

          jq -n --rawfile reasoning pass2-reasoning.md --rawfile content pass2-content.md --rawfile diff diff.txt --arg prompt "$PASS3_PROMPT" '{
            messages: [{role: "user", content: ($prompt + "\n\n# analyst reasoning\n\n" + $reasoning + "\n\n# analyst conclusions\n\n" + $content + "\n\n# diff.txt\n\n" + $diff)}],
            chat_template_kwargs: {enable_thinking: false},
            temperature: 0.2,
            max_tokens: 4096,
            response_format: {type: "json_schema", json_schema: {name: "review_report", schema: {
              type: "object",
              properties: {
                critical_issues: {type: "array", items: {type: "string"}},
                potential_issues: {type: "array", items: {type: "string"}},
                suggestions: {type: "array", items: {type: "string"}},
                summary: {type: "string"}
              },
              required: ["critical_issues", "potential_issues", "suggestions", "summary"]
            }}}
          }' > pass3-request.json || fail "building pass 3 request"

          echo "Pass 3: structured transcription (json_schema constrained)"
          llm_call pass3-request.json pass3-response.json 300 || fail "pass 3 API call"
          jq -e '.choices[0].message.content | fromjson' pass3-response.json > review.json 2>/dev/null \
            || fail "pass 3 returned unparseable JSON (finish_reason: $(jq -r '.choices[0].finish_reason' pass3-response.json))"

          jq -r '
            def section(items): if (items | length) == 0 then "None found" else (items | map("- " + .) | join("\n")) end;
            "## Critical Issues\n\n" + section(.critical_issues)
            + "\n\n## Potential Issues\n\n" + section(.potential_issues)
            + "\n\n## Suggestions\n\n" + section(.suggestions)
            + "\n\n## Summary\n\n" + .summary
          ' review.json > llm-analysis-raw.md || fail "rendering markdown report"

          echo "llm_exit=0" >> "$GITHUB_OUTPUT"

      - name: Generate report
        id: report
        if: always()
        run: |
          touch llm-analysis-raw.md
          echo "raw output size: $(wc -c < llm-analysis-raw.md) bytes"

          sed 's/\x1b\[[0-9;]*[a-zA-Z]//g' llm-analysis-raw.md > llm-analysis-clean.md

          if grep -q '^## Critical Issues' llm-analysis-clean.md; then
            sed -n '/^## Critical Issues/,$p' llm-analysis-clean.md > llm-analysis.md
            echo "structured=true" >> "$GITHUB_OUTPUT"
          else
            echo "structured=false" >> "$GITHUB_OUTPUT"
            {
              echo "## LLM Analysis (structured report not produced)"
              echo ""
              echo "The model did not output the expected sections"
              echo ""
              echo "- exit code: \`${{ steps.llm_analysis.outputs.llm_exit }}\`"
              echo ""
              echo "Raw output tail:"
              echo ""
              echo '```'
              tail -c 4000 llm-analysis-clean.md
              echo '```'
            } > llm-analysis.md
          fi

      - name: Show review output
        if: always()
        run: cat llm-analysis-raw.md

      - name: Post PR Comment
        if: github.event_name == 'pull_request' && steps.llm_analysis.outcome == 'success' && steps.report.outputs.structured == 'true'
        continue-on-error: true
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file llm-analysis.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Add to Job Summary
        if: always()
        continue-on-error: true
        run: |
          cat llm-analysis.md >> "$GITHUB_STEP_SUMMARY"
          {
            echo ""
            echo "<details><summary>Raw review output</summary>"
            echo ""
            echo '```'
            cat llm-analysis-raw.md
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Analysis Artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: llm-analysis-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            llm-analysis.md
            llm-analysis-raw.md
            files-requested.json
            context.txt
            pass2-reasoning.md
            pass2-content.md
            review.json
          if-no-files-found: ignore

      - name: Post Warning on Failure
        if: ${{ !cancelled() && (steps.llm_analysis.outcome != 'success' || steps.report.outputs.structured != 'true') }}
        continue-on-error: true
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body "**LLM Analysis Warning**: The analysis didn't complete or produced an unstructured report (see the run's job summary and artifacts). This is non-blocking and doesn't affect PR approval."
          else
            echo "::warning::LLM analysis didn't complete for this ${{ github.event_name }} event."
          fi
        env:
          GH_TOKEN: ${{ github.token }}
