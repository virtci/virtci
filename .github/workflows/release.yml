name: Release

# How To Trigger a Release
#
# Ensure you're on latest main `git checkout main && git pull`
# Ensure a clean working tree `git status`
#
# Push the tag
# ```sh
# git tag -a v1.2.3 -m "Release 1.2.3"
# git push origin v1.2.3
# ```

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+' # something like v1.2.3
      - 'v[0-9]+.[0-9]+.[0-9]+~*' # something like v1.2.3~rc1

permissions:
  contents: write
  pull-requests: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check Cargo.toml version matches the tag
        run: |
          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            echo "Not a tag push (${GITHUB_REF}) so skipping version check."
            exit 0
          fi

          # Tag may be v1.2.3 or v1.2.3~rc1 so just get the X.Y.Z core.
          tag="${GITHUB_REF_NAME}"
          tag_version="${tag#v}"
          tag_version="${tag_version%%~*}"

          echo "Tag: ${tag} (core: ${tag_version})"

          if ! cargo pkgid "virtci@${tag_version}"; then
            echo "::error::Cargo.toml version does not match tag (${tag_version})."
            exit 1
          fi

  run-tests:
    needs: [verify-version]
    uses: ./.github/workflows/ci.yml

  build-linux-x64-bootstrap:
    needs: [run-tests]
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - uses: actions/checkout@v6

      - name: Run VirtCI build
        run: virtci run package/linux_x64_package.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: virtci-linux-x64
          path: |
            virtci-linux-x64.tar.gz
            virtci-linux-x64.deb
            virtci-linux-x64.rpm

  build-linux-arm64-bootstrap:
    needs: [run-tests]
    runs-on:
      - self-hosted
      - macOS
      - ARM64
    steps:
      - uses: actions/checkout@v6

      - name: Run VirtCI build
        run: virtci run package/linux_arm64_package.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: virtci-linux-arm64
          path: |
            virtci-linux-arm64.tar.gz
            virtci-linux-arm64.deb
            virtci-linux-arm64.rpm

  build-macos-bootstrap:
    needs: [run-tests]
    runs-on:
      - self-hosted
      - macOS
      - ARM64
    steps:
      - uses: actions/checkout@v6

      - name: Run VirtCI build
        run: virtci run package/mac_package.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: virtci-macos-multiarch
          path: virtci-macos-multiarch.tar.gz

  build-windows-x64-bootstrap:
    needs: [run-tests]
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - uses: actions/checkout@v6

      - name: Run VirtCI build
        run: virtci run package/windows_x64_package.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: virtci-windows-x64
          path: virtci-windows-x64.tar.gz

  build-windows-arm64-bootstrap:
    needs: [run-tests]
    runs-on:
      - self-hosted
      - macOS
      - ARM64
    steps:
      - uses: actions/checkout@v6

      - name: Run VirtCI build
        run: virtci run package/windows_arm64_package.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: virtci-windows-arm64
          path: virtci-windows-arm64.tar.gz

  release:
    needs:
      [
        build-linux-x64-bootstrap,
        build-linux-arm64-bootstrap,
        build-macos-bootstrap,
        build-windows-x64-bootstrap,
        build-windows-arm64-bootstrap,
      ]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/virtci-linux-x64.tar.gz
            artifacts/virtci-linux-x64.deb
            artifacts/virtci-linux-x64.rpm
            artifacts/virtci-linux-arm64.tar.gz
            artifacts/virtci-linux-arm64.deb
            artifacts/virtci-linux-arm64.rpm
            artifacts/virtci-macos-multiarch.tar.gz
            artifacts/virtci-windows-x64.tar.gz
            artifacts/virtci-windows-arm64.tar.gz

  publish-homebrew:
    needs: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v6
        with:
          name: virtci-macos-multiarch

      - name: Update Homebrew formula
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          REPO_OWNER: ${{ github.repository_owner }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${TAG#v}"
          URL="https://github.com/${REPO}/releases/download/${TAG}/virtci-macos-multiarch.tar.gz"
          SHA256=$(sha256sum virtci-macos-multiarch.tar.gz | awk '{print $1}')

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${REPO_OWNER}/homebrew-virtci.git" tap
          cd tap

          sed -i "s|url \".*\"|url \"${URL}\"|"             Formula/virtci.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|"   Formula/virtci.rb
          sed -i "s|version \".*\"|version \"${VERSION}\"|" Formula/virtci.rb

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/virtci.rb
          git commit -m "virtci ${VERSION}"
          git push

