name: "CI"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'

jobs:
  # Needs manual approval before it can run.
  # Skipped for push and workflow_dispatch.
  gate:
    if: github.event_name == 'pull_request'
    environment: ci-protected
    runs-on: ubuntu-latest
    steps:
      - name: Approved
        run: echo "CI approved"

  check:
    needs: gate
    if: always() && (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - uses: actions/checkout@v4

      - name: Run CI checks
        run: virtci run tests/virtci/cargo.yml
