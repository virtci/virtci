name: CI

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'

# PR runs share a per-PR group so a new commit cancels the in-progress run.
# Everything else like a push to main or workflow dispatch gets a unique group per run, so
# main pushes never queue behind or cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  ubuntu-x64-check:
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Checks and Dependency Audits
        run: exec cargo run -- run .ci/check/ubuntu_check_x64.yml

  ubuntu-arm64-check:
    runs-on:
      - self-hosted
      - macOS
      - ARM64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Checks and Dependency Audits
        run: exec cargo run -- run .ci/check/ubuntu_check_arm64.yml

  macos-arm64-check:
    runs-on:
      - self-hosted
      - macOS
      - ARM64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Checks and Dependency Audits
        run: exec cargo run -- run .ci/check/macos_check_arm64.yml

  windows-x64-check:
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Checks and Dependency Audits
        run: exec cargo run -- run .ci/check/windows_check_x64.yml

  windows-arm64-check:
    runs-on:
      - self-hosted
      - macOS
      - ARM64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Checks and Dependency Audits
        run: exec cargo run -- run .ci/check/windows_check_arm64.yml

  ubuntu-x64-host-system-tests:
    needs: ubuntu-x64-check
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run System Tests
        run: exec cargo run -- run .ci/system_tests/ubuntu_system_tests_x64.yml

  ubuntu-arm64-host-system-tests:
    needs: ubuntu-arm64-check
    runs-on:
      - self-hosted
      - macOS
      - ARM64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run System Tests
        run: exec cargo run -- run .ci/system_tests/ubuntu_system_tests_arm64.yml

  macos-arm64-host-system-tests:
    needs: macos-arm64-check
    runs-on:
      - self-hosted
      - macOS
      - ARM64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run System Tests
        run: exec cargo run -- run .ci/system_tests/macos_system_tests_arm64.yml

  windows-x64-host-system-tests:
    needs: windows-x64-check
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run System Tests
        run: exec cargo run -- run .ci/system_tests/windows_system_tests_x64.yml

  windows-arm64-host-system-tests:
    needs: windows-arm64-check
    runs-on:
      - self-hosted
      - macOS
      - ARM64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run System Tests
        run: exec cargo run -- run .ci/system_tests/windows_system_tests_arm64.yml
